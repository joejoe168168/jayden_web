<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160">
  <defs>
    <linearGradient id="wrapper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFC125"/>
      <stop offset="100%" style="stop-color:#E5A100"/>
    </linearGradient>
    <linearGradient id="meat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E57373"/>
      <stop offset="100%" style="stop-color:#C62828"/>
    </linearGradient>
    <radialGradient id="steam" cx="50%" cy="100%" r="60%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Wrapper body - cylindrical pleated skin -->
  <path d="M30 90 Q28 60 38 50 Q48 42 60 40 Q72 42 82 50 Q92 60 90 90 Q90 110 85 120 Q75 130 60 132 Q45 130 35 120 Q30 110 30 90Z" fill="url(#wrapper)" stroke="#DAA520" stroke-width="1.5"/>
  
  <!-- Vertical pleats on wrapper -->
  <path d="M38 85 Q36 65 42 52" stroke="#DAA520" stroke-width="1" fill="none" opacity="0.7"/>
  <path d="M48 88 Q46 62 52 48" stroke="#DAA520" stroke-width="1" fill="none" opacity="0.7"/>
  <path d="M60 90 Q60 58 60 44" stroke="#DAA520" stroke-width="1" fill="none" opacity="0.7"/>
  <path d="M72 88 Q74 62 68 48" stroke="#DAA520" stroke-width="1" fill="none" opacity="0.7"/>
  <path d="M82 85 Q84 65 78 52" stroke="#DAA520" stroke-width="1" fill="none" opacity="0.7"/>
  
  <!-- Open top - meat filling visible -->
  <ellipse cx="60" cy="44" rx="22" ry="10" fill="url(#meat)" stroke="#B71C1C" stroke-width="1"/>
  
  <!-- Meat texture dots -->
  <circle cx="52" cy="42" r="2" fill="#FFCDD2" opacity="0.5"/>
  <circle cx="65" cy="43" r="1.5" fill="#FFCDD2" opacity="0.5"/>
  <circle cx="58" cy="46" r="1.8" fill="#FFCDD2" opacity="0.4"/>
  
  <!-- Green pea garnish on top -->
  <circle cx="60" cy="40" r="5" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
  <circle cx="60" cy="40" r="2.5" fill="#81C784"/>
  
  <!-- Wrapper rim highlight -->
  <path d="M38 52 Q48 44 60 42 Q72 44 82 52" stroke="#FFE082" stroke-width="2" fill="none" opacity="0.5"/>
  
  <!-- Steam lines -->
  <path d="M50 32 Q46 22 52 14" stroke="#fff" stroke-width="2" fill="none" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="d" values="M50 32 Q46 22 52 14;M50 32 Q44 20 54 10;M50 32 Q46 22 52 14" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M60 28 Q56 18 62 10" stroke="#fff" stroke-width="2.5" fill="none" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.15;0.4" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="d" values="M60 28 Q56 18 62 10;M60 28 Q54 16 64 6;M60 28 Q56 18 62 10" dur="2.8s" repeatCount="indefinite"/>
  </path>
  <path d="M70 32 Q66 22 72 14" stroke="#fff" stroke-width="2" fill="none" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0.1;0.25" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="d" values="M70 32 Q66 22 72 14;M70 32 Q64 20 74 10;M70 32 Q66 22 72 14" dur="2.6s" repeatCount="indefinite"/>
  </path>
</svg>
